volumes:
  dispatch_db_data:
  dispatch_static:
  dispatch_media:
  dispatch_redis_data:
  dispatch_grafana_data:

networks:
  dispatch_network:
    driver: bridge

# Общая конфигурация логирования
x-log-opts: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "2"

services:
  # PostgreSQL
  dispatch_db:
    image: postgres:13.10
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - dispatch_db_data:/var/lib/postgresql/data
    networks:
      - dispatch_network
    restart: unless-stopped
    environment:
      POSTGRES_HOST_AUTH_METHOD: "md5"
    command: >
      postgres
      -c listen_addresses='*'
      -c max_connections=300
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB

  # Redis (для кэша)
  dispatch_redis:
    image: redis:7-alpine
    container_name: dispatch_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - dispatch_redis_data:/data
    networks:
      - dispatch_network
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  # RabbitMQ (для Celery broker + optional result backend)
  dispatch_rabbitmq:
    image: rabbitmq:3.12-management
    container_name: dispatch_rabbitmq
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - dispatch_network
    restart: unless-stopped

  # Celery worker (основные задачи)
  dispatch_celery_worker:
    <<: *default-logging
    build:
      context: .
    working_dir: /app
    command: >
      celery -A backend.celery worker --loglevel=error --logfile=/app/logs/celery/celery_worker.log -Q default,low,medium,high  --concurrency=4
    env_file: .env
    volumes:
      - dispatch_media:/app/media
      - ./logs:/app/logs        # bind mount для логов
      - ./data:/app/data        # bind mount для data
    depends_on:
      - dispatch_db
      - dispatch_rabbitmq
    networks:
      - dispatch_network
    restart: unless-stopped

  # Celery worker (тяжелые задачи)
  dispatch_celery_heavy_worker:
    <<: *default-logging
    build:
      context: .
    working_dir: /app
    command: celery -A backend.celery worker --loglevel=error --logfile=/app/logs/celery/celery_heavy_worker.log -Q heavy --concurrency=2
    env_file: .env
    volumes:
      - dispatch_media:/app/media
      - ./logs:/app/logs        # bind mount для логов
      - ./data:/app/data        # bind mount для data
    depends_on:
      - dispatch_db
      - dispatch_rabbitmq
    networks:
      - dispatch_network
    restart: unless-stopped

  # Celery worker (планировщик задач)
  dispatch_celery_beat:
    <<: *default-logging
    build: .
    command: celery -A backend.celery beat --loglevel=error --logfile=/app/logs/celery/celery_beat.log
    env_file: .env
    volumes:
      - dispatch_media:/app/media
      - ./logs:/app/logs        # bind mount для логов
      - ./data:/app/data        # bind mount для data
    depends_on:
      - dispatch_db
      - dispatch_rabbitmq
    networks:
      - dispatch_network
    restart: unless-stopped

  # Django backend
  dispatch_backend:
    build:
      context: .
    env_file: .env
    volumes:
      - dispatch_static:/app/collected_static
      - dispatch_media:/app/media
      - ./logs:/app/logs        # bind mount для логов
      - ./data:/app/data        # bind mount для data
      - ./.env:/app/.env:ro   # монтируем .env внутрь контейнера (для cron)
    depends_on:
      - dispatch_db
      - dispatch_rabbitmq
      - dispatch_redis
    networks:
      - dispatch_network
    restart: unless-stopped

  dispatch_grafana:
    image: grafana/grafana:latest
    container_name: dispatch_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SERVER_ROOT_URL=http://10.10.10.157/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SERVER_PROTOCOL=http
      - GF_SERVER_FORCE_HTTPS=false

      # Базовые настройки безопасности
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SECURITY_COOKIE_SECURE=false
      
      # Auth Proxy (для Django)
      - GF_AUTH_PROXY_ENABLED=false 
      # - GF_AUTH_PROXY_ENABLED=true
      # - GF_AUTH_PROXY_HEADER_NAME=X-WEBAUTH-USER
      # - GF_AUTH_PROXY_HEADER_PROPERTY=username
      # - GF_AUTH_PROXY_AUTO_SIGN_UP=true
      # - GF_AUTH_PROXY_SYNC_TTL=60
      # - GF_AUTH_PROXY_WHITELIST=127.0.0.1,::1,dispatch_backend
      
      # Кэш и логи
      - GF_DATASOURCE_QUERY_CACHE_ENABLED=true
      - GF_DATASOURCE_QUERY_CACHE_MAX_ENTRIES=1000
      - GF_DATASOURCE_QUERY_CACHE_TTL=60s
      - GF_LOG_LEVEL=info
      - GF_LOG_MODE=file
      - GF_LOG_FILE=/var/log/grafana/grafana.log

      # Разрешить встраивание (важно для iframe)
      - GF_SECURITY_ALLOW_EMBEDDING=true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3" 

    volumes:
      - dispatch_grafana_data:/var/lib/grafana
      - ./logs/grafana:/var/log/grafana
    networks:
      - dispatch_network
    depends_on:
      - dispatch_db

  # Nginx
  dispatch_gateway:
    build:
      context: ./gateway/
    ports:
      - "8000:80"
    volumes:
      - dispatch_static:/staticfiles/
      - dispatch_media:/mediafiles/
      - ./logs/nginx:/var/log/nginx   # отдельная папка под nginx-логи
    depends_on:
      - dispatch_backend
      - dispatch_grafana
    networks:
      - dispatch_network
    restart: unless-stopped

