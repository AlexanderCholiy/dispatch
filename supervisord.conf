[program:gunicorn]
command=bash -c "gunicorn backend.asgi:application \
    -k uvicorn.workers.UvicornWorker \
    -w 4 \
    --bind 0.0.0.0:8000 \
    --timeout 60 \
    --keep-alive 5 \
    --max-requests 1000 \
    --max-requests-jitter 100 \
    --log-level error"
autostart=true
autorestart=true
startsecs=10
priority=10
redirect_stderr=true
# stdout_logfile=/app/logs/supervisor/gunicorn.log
stderr_logfile=/app/logs/supervisor/gunicorn_error.log
logfile_maxbytes=10MB
logfile_backups=2