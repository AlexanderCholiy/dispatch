[supervisord]
nodaemon=true
logfile=/app/logs/supervisor/supervisord.log
loglevel=error
pidfile=/var/run/supervisord.pid
logfile_maxbytes=10MB
logfile_backups=2

[program:django_init]
command=bash -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py add_default_admin && python manage.py add_default_values"
autostart=true
autorestart=false
startsecs=0
priority=1
stderr_logfile=/app/logs/supervisor/django_init_error.log
# stdout_logfile=/app/logs/supervisor/django_init.log
logfile_maxbytes=10MB
logfile_backups=2

[program:cron]
command=cron -f
autostart=true
autorestart=true
startsecs=0
priority=20
stderr_logfile=/app/logs/supervisor/cron_error.log
logfile_maxbytes=10MB
logfile_backups=2

[program:parsing_inbox_emails]
command=bash -c "python manage.py parsing_emails --mailbox inbox"
autostart=true
autorestart=true
startsecs=0
priority=30
stderr_logfile=/app/logs/supervisor/parsing_inbox_emails_error.log
logfile_maxbytes=10MB
logfile_backups=2

[program:parsing_sent_emails]
command=bash -c "python manage.py parsing_emails --mailbox sent"
autostart=true
autorestart=true
startsecs=0
priority=31
stderr_logfile=/app/logs/supervisor/parsing_sent_emails_error.log
logfile_maxbytes=10MB
logfile_backups=2

[program:add_issues_2_yt]
command=bash -c "python manage.py add_issues_2_yt"
autostart=true
autorestart=true
startsecs=0
priority=32
stderr_logfile=/app/logs/supervisor/add_issues_2_yt_error.log
logfile_maxbytes=10MB
logfile_backups=2

[program:check_closed_yt_issues]
command=bash -c "python manage.py check_closed_yt_issues"
autostart=true
autorestart=true
startsecs=0
priority=33
stderr_logfile=/app/logs/supervisor/check_closed_yt_issues_error.log
logfile_maxbytes=10MB
logfile_backups=2

[program:check_unclosed_yt_issues]
command=bash -c "python manage.py check_unclosed_yt_issues"
autostart=true
autorestart=true
startsecs=0
priority=34
stderr_logfile=/app/logs/supervisor/check_unclosed_yt_issues_error.log
logfile_maxbytes=10MB
logfile_backups=2

