{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-xl">
  <div class="card" style="height: 100%;">
    <iframe 
      id="grafana-frame"
      src="{{ grafana_url }}" 
      width="100%" 
      height="100%" 
      frameborder="0" 
      allowtransparency="true"
      loading="lazy"
    ></iframe>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/metrics/reload_page_with_theme_toggle.js' %}"></script>
{% endblock %}
