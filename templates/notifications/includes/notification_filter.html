{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/includes/table_filter.css' %}">
{% endblock %}

<form method="get" class="table-filter-form" id="filter-form">
  <div class="left-part">
    <!-- Фильтр: Прочитано (Множественный выбор) -->
    <div class="multiple-select-wrapper" id="read-select">
      <div class="dropdown-trigger" data-filter-name="Статус">
        <span class="selected-label">Статус</span>
        <span class="arrow-icon">▼</span>
      </div>

      <div class="dropdown-menu" id="read-dropdown-menu">
        <div class="dropdown-options">
          <label class="option-item {% if 'true' in selected.read %}is-selected{% endif %}" 
                 data-value="true">
            <i class="bx bx-check"></i>
            <span>Прочитанные</span>
          </label>

          <label class="option-item {% if 'false' in selected.read %}is-selected{% endif %}" 
                 data-value="false">
            <i class="bx bx-check"></i>
            <span>Не прочитанные</span>
          </label>
        </div>
      </div>

      <!-- Скрытый select для отправки формы -->
      <select name="read" id="read-select-hidden" style="display: none;" multiple>
        <option value="true" 
                {% if 'true' in selected.read %}selected{% endif %}>
        </option>
        <option value="false" 
                {% if 'false' in selected.read %}selected{% endif %}>
        </option>
      </select>
    </div>

    <!-- Фильтр: Приоритет (Множественный выбор) -->
    <div class="multiple-select-wrapper" id="level-select">
      <div class="dropdown-trigger" data-filter-name="Приоритет">
        <span class="selected-label">Приоритет</span>
        <span class="arrow-icon">▼</span>
      </div>

      <div class="dropdown-menu" id="level-dropdown-menu">
        <div class="dropdown-options">
          {% for v in levels %}
            <label class="option-item {% if v in selected.level %}is-selected{% endif %}" 
                   data-value="{{ v }}">
              <i class="bx bx-check"></i>
              <span>{{ v.label }}</span>
            </label>
          {% endfor %}
        </div>
      </div>

      <!-- Скрытый select для отправки формы -->
      <select name="level" id="level-select-hidden" style="display: none;" multiple>
        {% for v in levels %}
          <option value="{{ v }}" {% if v in selected.level %}selected{% endif %}></option>
        {% endfor %}
      </select>
    </div>
  </div>
    
  <div class="right-parts">
    <div class="select-wrapper">
      <select name="per_page" id="per-page" class="select tooltip" data-title="Кол-во уведомлений на странице">
        {% for size in page_size_choices %}
        <option value="{{ size }}" {% if selected.per_page == size %}selected{% endif %}>Показать: {{ size }}</option>
        {% endfor %}
      </select>
    </div>
    <a href="{% url 'notifications:notification_create' %}" 
      class="btn btn-warning tooltip" 
      data-title="Добавить уведомление">
      <i class="bx bx-plus"></i>
    </a>

    <button type="button" id="reset-filters" class="btn btn-secondary tooltip" data-title="Сбросить фильтры">
      <i class="bx bx-x-circle"></i>
    </button>
    {% if selected.sort == "asc" %}
    <button type="button" class="btn btn-secondary sort-notification-btn tooltip" data-sort="desc" data-param="sort_notifications" data-cookie="sort_notifications" data-title="Сначала старые">
      <i class='bx bx-chevrons-down'></i>
    </button>
    {% else %}
    <button type="button" class="btn btn-secondary sort-notification-btn tooltip" data-sort="asc" data-param="sort_notifications" data-cookie="sort_notifications" data-title="Сначала новые">
      <i class='bx bx-chevrons-up'></i>
    </button>
    {% endif %}
    <button type="submit" class="btn btn-primary tooltip" data-title="Применить фильтр">
      <i class="bx bx-filter"></i>
    </button>
  </div>

  <input type="hidden" name="q" value="{{ search_query }}" id="filter-hidden-q">

</form>

{% block extra_js %}
<script>
    const filtersConfig = [
        { id: 'read-select-hidden', cookieName: 'read', searchFieldName: 'read', type: 'multi_select' },
        { id: 'level-select-hidden', cookieName: 'level', searchFieldName: 'level', type: 'multi_select' },
        { id: 'per-page', cookieName: 'per_page_notifications', searchFieldName: 'per_page', type: 'single_select', skipOnReset: true },
    ];
</script>
<script src="{% static 'js/universal_filters.js' %}"></script>
<script src="{% static 'js/sort_table.js' %}"></script>
<script src="{% static 'js/multiple_select.js' %}"></script>
{% endblock %}
