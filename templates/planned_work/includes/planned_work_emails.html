<!-- templates/planned_work/includes/planned_work_emails_table.html -->
<div class="card" style="margin-top: 20px; border: 1px solid #ddd;">
  <div class="card-header bg-light d-flex justify-content-between align-items-center">
    <strong>Связанные письма</strong>
    <!-- Кнопка "Выбрать все" для удаления -->
    <button type="button" id="toggle-all-delete" class="btn btn-sm btn-secondary" onclick="toggleDeleteCheckboxes()">
      Выбрать все
    </button>
  </div>
  
  <div class="card-body p-0">
    <!-- Management Form для FormSet (скрытые поля) -->
    {{ email_formset.management_form }}
    
    <div class="table-responsive">
      <table class="table table-bordered table-hover mb-0" style="width: 100%;">
        <thead class="table-light">
          <tr>
            <th style="width: 5%; text-align: center;">№</th>
            <th style="width: 85%;">Выбранное письмо</th>
            <th style="width: 10%; text-align: center;">Удалить</th>
          </tr>
        </thead>
        <tbody>
          {% for form in email_formset %}
          <tr>
            <td class="text-center align-middle">{{ forloop.counter }}</td>
            <td class="align-middle">
              <div class="select-wrapper">
                {{ form.email }}
                {% if form.email.errors %}
                  <div class="form-error small mt-1 text-danger">{{ form.email.errors }}</div>
                {% endif %}
              </div>
            </td>
            <td class="text-center align-middle">
              <label class="custom-checkbox-wrapper" title="Отметьте, чтобы удалить эту связь">
                {{ form.DELETE }}
                <i class="bx bx-x check-icon delete-icon"></i>
              </label>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="3" class="text-center py-4 text-muted">
              Нет выбранных писем. Добавьте новое ниже.
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
function toggleDeleteCheckboxes() {
    const btn = document.getElementById('toggle-all-delete');
    // Находим все чекбоксы с именем заканчивающимся на -DELETE
    const checkboxes = document.querySelectorAll('input[name$="-DELETE"]');
    
    let allChecked = true;
    checkboxes.forEach(cb => {
        if (!cb.checked) allChecked = false;
    });

    // Переключаем состояние
    const newState = !allChecked;
    
    checkboxes.forEach(cb => {
        cb.checked = newState;
    });

    btn.textContent = newState ? 'Снять все' : 'Выбрать все';
}
</script>
